name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open vedrr
        2. Navigate to...
        3. Press...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux (Debian/Ubuntu)
        - Linux (Other)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: vedrr version
      description: Check in Settings or the title bar.
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / GIFs
      description: If applicable, add screenshots or recordings to help explain the problem.
    validations:
      required: false
