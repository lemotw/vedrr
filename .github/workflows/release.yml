name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_INCREMENTAL: 0

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-14
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: '--bundles deb'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache embedding model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: src-tauri/resources/models
          key: embedding-model-multilingual-e5-small-v1

      - name: Download embedding model
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          pip install huggingface-hub
          python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              'intfloat/multilingual-e5-small',
              cache_dir='src-tauri/resources/models',
              ignore_patterns=['*.safetensors', '*.bin', '*.h5', '*.pt', '*.ot']
          )
          "

      - run: pnpm install

      # Windows: bundle MSVC runtime DLLs so users don't need VC++ Redistributable
      - name: Bundle MSVC runtime (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          for dll in vcruntime140.dll vcruntime140_1.dll msvcp140.dll; do
            src="/c/Windows/System32/$dll"
            if [ -f "$src" ]; then
              cp "$src" src-tauri/
              echo "Copied $dll"
            fi
          done
          python -c "
          import json
          with open('src-tauri/tauri.conf.json', 'r') as f:
              conf = json.load(f)
          res = conf['bundle']['resources']
          res['vcruntime140.dll'] = '.'
          res['vcruntime140_1.dll'] = '.'
          res['msvcp140.dll'] = '.'
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          "

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_APP_VERSION: ${{ github.ref_name }}
          # macOS code signing & notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'vedrr ${{ github.ref_name }}'
          releaseBody: 'See commits for changelog.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Upload version-free copies so /releases/latest/download/{name} always works
      - name: Upload stable download links
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          artifacts='${{ steps.tauri.outputs.artifactPaths }}'
          for file in $(echo "$artifacts" | tr -d '[]"' | tr ',' '\n'); do
            [ -f "$file" ] || continue
            basename=$(basename "$file")
            # Strip version pattern: vedrr_0.1.0_aarch64.dmg -> vedrr_aarch64.dmg
            stable=$(echo "$basename" | sed -E 's/_[0-9]+\.[0-9]+\.[0-9]+//')
            if [ "$stable" != "$basename" ]; then
              cp "$file" "/tmp/$stable"
              gh release upload "$TAG" "/tmp/$stable" --clobber
              echo "Uploaded stable link: $stable"
            fi
          done
