name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_INCREMENTAL: 0

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache embedding model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: src-tauri/resources/models
          key: embedding-model-multilingual-e5-small-v1

      - name: Download embedding model
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          pip install huggingface-hub
          python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              'intfloat/multilingual-e5-small',
              cache_dir='src-tauri/resources/models',
              ignore_patterns=['*.safetensors', '*.bin', '*.h5', '*.pt', '*.ot']
          )
          "

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'vedrr ${{ github.ref_name }}'
          releaseBody: 'See commits for changelog.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
